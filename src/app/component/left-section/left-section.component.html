<section class="resume-section experience-section mb-5">
  <h2 class="resume-section-title text-uppercase font-weight-bold pb-3 mb-3">
    <i class="fa-solid fa-briefcase"></i>
    Work Experience
  </h2>
  <div class="timeline">
    <div class="timeline-card timeline-card-primary card shadow-sm" *ngFor="let item of workExperience;">
      <div class="card-header">
        <div class="row">
          <div class="col-8">
            <div class="card-title h6">{{item.company}} </div>
            <div class="card-subtitle">{{item.position}} </div>
          </div>
          <div class="col-4">
            <div class="card-subtitle">{{item.year}} </div>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-subtitle">Achivements : </div>
        <ul>
          <li *ngFor="let ahv of item.achivements">{{ ahv.name }}</li>
        </ul>
      </div>
      <div class="card-footer">
        <div class="card-subtitle">Technologies used: </div>
        <ul class="list-inline">
          <li class="list-inline-item" *ngFor="let item of item.technologies_used">
            <span class="badge badge-light">{{ item }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
