<section class="resume-section experience-section mb-5">
  <h2 class="resume-section-title text-uppercase font-weight-bold pb-3 mb-3">
    <i class="fa-solid fa-briefcase"></i>
    Work Experience
  </h2>
  <div class="resume-section-content">
    <div class="resume-timeline position-relative">
      <article class="resume-timeline-item position-relative" *ngFor="let item of workExperience">
        <div class="resume-timeline-item-header mb-2">
          <div class="d-flex flex-column flex-md-row">
            <h3 class="resume-position-title font-weight-bold mb-1">
              {{ item.position }}
            </h3>
          </div>
          <div class="resume-company-name ms-auto">{{ item.company }}</div>
          <!--//row-->
          <div class="resume-position-time">{{ item.year }}</div>
        </div>
        <!--//resume-timeline-item-header-->
        <div class="resume-timeline-item-desc">
          <p>{{ item.description }}</p>
          <h4 class="resume-timeline-item-desc-heading font-weight-bold">
            Achievements:
          </h4>
          <p>{{ item.achivement_details }}</p>
          <ul>
            <li *ngFor="let ahv of item.achivements">{{ ahv.name }}</li>
          </ul>
          <h4 class="resume-timeline-item-desc-heading font-weight-bold">
            Technologies used:
          </h4>
          <ul class="list-inline">
            <li class="list-inline-item" *ngFor="let item of item.technologies_used">
              <span class="badge badge-light">{{ item }}</span>
            </li>
          </ul>
        </div>
        <!--//resume-timeline-item-desc-->
      </article>
      <!--//resume-timeline-item-->
    </div>
    <!--//resume-timeline-->
  </div>
</section>
<!--//experience-section-->
