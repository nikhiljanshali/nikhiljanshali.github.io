<section class="resume-section experience-section mb-5">
  <h2 class="resume-section-title text-uppercase font-weight-bold pb-3 mb-3">
    <i class="fa-solid fa-briefcase"></i>
    Work Experience
  </h2>
  <div class="timeline">
    <div
      class="timeline-card timeline-card-primary card shadow-sm"
      *ngFor="let item of workExperience"
    >
      <div class="card-header">
        <div class="row">
          <div class="col-12">
            <div class="card-title h5">{{ item.company }}</div>
          </div>
        </div>
      </div>
      <div class="card-header">
        <div class="row">
          <div class="col-12">
            <div class="card-subtitle">Position : {{ item.position }}</div>
            <div class="card-subtitle">Working Years : {{ item.year }}</div>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-subtitle">Description :</div>
        <ul>
          <li *ngFor="let ahv of item.description">{{ ahv }}</li>
        </ul>
      </div>
      <div class="card-footer">
        <div class="card-subtitle">Technologies Experiene:</div>
        <ul class="list-inline">
          <li class="list-inline-item" *ngFor="let item of item.technologies">
            <span class="badge badge-light">{{ item }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
