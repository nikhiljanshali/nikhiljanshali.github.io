<div class="row">
  <div class="primary-info">
    <div class="resume-doc-link" *ngFor="let item of detail?.contact">
      <span *ngIf="item.status">
        <i ngClass="{{ item.icon }}"></i>
        <span class="fa-container text-center me-2">
          {{ item.value }}
        </span>
      </span>
    </div>
  </div>
</div>
