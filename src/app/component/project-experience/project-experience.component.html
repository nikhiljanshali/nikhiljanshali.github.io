<section class="resume-section experience-section mb-5">
  <h2 class="resume-section-title text-uppercase font-weight-bold pb-3 mb-3">Software Projects</h2>
  <div class="timeline">
    <div class="timeline-card timeline-card-primary card shadow-sm" *ngFor="let item of projectExperience;">
      <div class="card-body">
        <div class="h5 mb-1">{{item.name}} <span class="text-muted h6">at Creative Agency</span></div>
        <div class="text-muted text-small mb-2">May, 2015 - Present</div>
        <div>Leverage agile frameworks to provide a robust synopsis for high level overviews. Iterative approaches to
          corporate strategy foster collaborative thinking to further the overall value proposition.</div>
      </div>
    </div>
  </div>
</section>
